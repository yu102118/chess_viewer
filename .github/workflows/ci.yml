name: CI Pipeline

on:
  push:
    branches:
      - master
      - develop
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
  pull_request:
    branches:
      - master
      - develop
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  quality-check:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint
        continue-on-error: false

      - name: Check Prettier formatting
        run: pnpm format:check
        continue-on-error: false

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: quality-check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm build

      - name: Check build output
        run: |
          echo "Build completed successfully"
          ls -lh dist/
          echo "Static files:"
          ls -lh dist/assets/ || echo "Assets directory structure may differ"

      - name: Calculate build size
        run: |
          BUILD_SIZE=$(du -sh dist/ | cut -f1)
          echo "Total build size: $BUILD_SIZE"
          if [ -d "dist/assets" ]; then
            ASSETS_SIZE=$(du -sh dist/assets/ | cut -f1)
            echo "Assets bundle size: $ASSETS_SIZE"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/
          retention-days: 7

  bundle-analysis:
    name: Bundle Size Analysis
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for analysis
        run: pnpm build

      - name: Analyze bundle
        run: |
          npx vite-bundle-visualizer --output bundle-analysis.html || echo "Analysis completed"

      - name: Upload bundle analysis
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analysis
          path: bundle-analysis.html
          retention-days: 30

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run pnpm audit
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for vulnerable dependencies
        run: |
          echo "Checking for known vulnerabilities..."
          pnpm audit --json > audit-results.json || true

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        with:
          name: security-audit
          path: audit-results.json
          retention-days: 30
        if: always()

  verify-deployment:
    name: Verify Deployment Files
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: dist/

      - name: Verify critical files
        run: |
          echo "Verifying build integrity..."

          if [ ! -f "dist/index.html" ]; then
            echo "Error: index.html not found"
            exit 1
          fi

          if [ ! -f "dist/manifest.json" ]; then
            echo "Warning: manifest.json not found"
          fi

          if [ ! -f "dist/robots.txt" ]; then
            echo "Warning: robots.txt not found"
          fi

          if [ ! -f "dist/sitemap.xml" ]; then
            echo "Warning: sitemap.xml not found"
          fi

          if [ ! -d "dist/assets" ]; then
            echo "Error: Assets directory not found"
            exit 1
          fi

          echo "Build verification completed successfully"

      - name: Check for sensitive data
        run: |
          echo "Checking for exposed secrets..."
          if grep -r "VITE_" dist/ --include="*.js" | head -5; then
            echo "Info: Found Vite environment variables (expected)"
          else
            echo "No environment variables found in build output"
          fi

  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [quality-check, build, security-audit]
    if: always()

    steps:
      - name: Check job statuses
        run: |
          echo "CI Pipeline Summary"
          echo "=================="
          echo "Code Quality: ${{ needs.quality-check.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "Security Audit: ${{ needs.security-audit.result }}"

          if [ "${{ needs.quality-check.result }}" != "success" ] || [ "${{ needs.build.result }}" != "success" ]; then
            echo "Pipeline failed - check logs above"
            exit 1
          fi

          echo "Pipeline completed successfully"
