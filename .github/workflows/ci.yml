name: CI Pipeline

on:
  push:
    branches:
      - master
      - develop
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/workflows/codeql.yml'
      - '.github/workflows/lint.yml'
  pull_request:
    branches:
      - master
      - develop
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.20.0'
  NODE_ENV: production

jobs:
  setup:
    name: Setup & Cache Dependencies
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.cache-deps.outputs.cache-hit }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache node_modules
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}

      - name: Build project
        run: npm run build
        env:
          CI: true
          GENERATE_SOURCEMAP: false

      - name: Check build output
        run: |
          echo "Build completed successfully"
          ls -lh build/ || true
          echo "Static files:"
          ls -lh build/static/ || true

      - name: Calculate build size
        run: |
          if [ -d "build" ]; then
            BUILD_SIZE=$(du -sh build/ | cut -f1)
            echo "Total build size: $BUILD_SIZE"
            
            if [ -d "build/static/js" ]; then
              JS_SIZE=$(du -sh build/static/js/ | cut -f1)
              echo "JavaScript bundle size: $JS_SIZE"
            fi
            
            if [ -d "build/static/css" ]; then
              CSS_SIZE=$(du -sh build/static/css/ | cut -f1)
              echo "CSS bundle size: $CSS_SIZE"
            fi
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output-${{ github.sha }}
          path: build/
          retention-days: 7
          if-no-files-found: error

  bundle-analysis:
    name: Bundle Size Analysis
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output-${{ github.sha }}
          path: build/

      - name: Analyze bundle size
        run: |
          echo "Bundle Size Analysis"
          echo "===================="
          du -sh build/ | awk '{print "Total: " $1}'
          du -sh build/static/js/ | awk '{print "JS: " $1}'
          du -sh build/static/css/ | awk '{print "CSS: " $1}'
          echo ""
          echo "Individual JS chunks:"
          du -h build/static/js/*.js 2>/dev/null | sort -h || echo "No JS files found"

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}

      - name: Run npm audit
        run: |
          echo "Security Audit Results"
          echo "======================"
          npm audit --audit-level=moderate || true
        continue-on-error: true

  verify-deployment:
    name: Verify Deployment Files
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop'

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output-${{ github.sha }}
          path: build/

      - name: Verify critical files
        run: |
          echo "Verifying build integrity..."

          if [ ! -f "build/index.html" ]; then
            echo "Error: index.html not found"
            exit 1
          fi

          if [ ! -d "build/static/js" ]; then
            echo "Error: JavaScript bundles not found"
            exit 1
          fi

          if [ ! -d "build/static/css" ]; then
            echo "Error: CSS bundles not found"
            exit 1
          fi

          echo "Build verification completed successfully"

      - name: Check for sensitive data
        run: |
          echo "Checking for exposed secrets..."
          if grep -r "REACT_APP" build/ --include="*.js" 2>/dev/null | grep -v "process.env"; then
            echo "::warning::Found hardcoded environment variables"
          else
            echo "No hardcoded environment variables found"
          fi
        continue-on-error: true

  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [setup, build, security-audit]
    if: always()

    steps:
      - name: Check job statuses
        run: |
          echo "CI Pipeline Summary"
          echo "======================"
          echo "Setup: ${{ needs.setup.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "Security Audit: ${{ needs.security-audit.result }}"
          echo ""

          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "::error::Pipeline failed - check logs above"
            exit 1
          fi

          echo "Pipeline completed successfully"
