name: Code Quality

on:
  push:
    branches:
      - master
      - develop
    paths:
      - 'src/**'
      - '**.js'
      - '**.jsx'
      - '**.json'
      - '**.css'
      - 'package.json'
      - 'package-lock.json'
      - '.eslintrc*'
      - '.prettierrc*'
      - 'eslint.config.js'
  pull_request:
    branches:
      - master
      - develop
    paths:
      - 'src/**'
      - '**.js'
      - '**.jsx'
      - '**.json'
      - '**.css'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.20.0'

jobs:
  setup:
    name: Setup Dependencies
    runs-on: ubuntu-latest
    outputs:
      cache-hit: ${{ steps.cache-deps.outputs.cache-hit }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache node_modules
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-quality-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-quality-${{ env.NODE_VERSION }}-
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-

      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline --no-audit

  eslint:
    name: ESLint Check
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-quality-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-quality-${{ env.NODE_VERSION }}-
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-

      - name: Run ESLint
        run: |
          echo "Running ESLint..."
          npm run lint || exit 1

      - name: Annotate code linting results
        if: failure()
        run: |
          echo "::error::ESLint found issues. Please fix them before merging."

  prettier:
    name: Prettier Format Check
    runs-on: ubuntu-latest
    needs: setup
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-quality-${{ env.NODE_VERSION }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-quality-${{ env.NODE_VERSION }}-
            ${{ runner.os }}-node-${{ env.NODE_VERSION }}-

      - name: Check code formatting
        run: |
          echo "Checking code formatting..."
          npm run format:check || exit 1

      - name: Annotate formatting issues
        if: failure()
        run: |
          echo "::warning::Code formatting issues found. Run 'npm run format' to fix."

  summary:
    name: Code Quality Summary
    runs-on: ubuntu-latest
    needs: [setup, eslint, prettier]
    if: always()

    steps:
      - name: Check results
        run: |
          echo "Code Quality Check Summary"
          echo "=============================="
          echo "Setup: ${{ needs.setup.result }}"
          echo "ESLint: ${{ needs.eslint.result }}"
          echo "Prettier: ${{ needs.prettier.result }}"
          echo ""

          if [ "${{ needs.eslint.result }}" != "success" ] || [ "${{ needs.prettier.result }}" != "success" ]; then
            echo "::error::Code quality checks failed"
            exit 1
          fi

          echo "All code quality checks passed"
